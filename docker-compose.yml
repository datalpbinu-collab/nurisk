version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: pusdatin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "7860:7860"
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: pusdatin
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET}
      PORT: 7860
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:4173}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "4173:80"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:7860/api/}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
